image: python:3.9

stages:
  - build

build_job:
  stage: build
  script:
    - python --version
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    # - pip install -r requirements.txt  # uncomment kar agar hai
  artifacts:
    paths:
      - .venv/