image: python:3.11

stages:
  - build
  - deploy

# Pipeline ka setup
variables:
  PYTHON_VERSION: "3.11"

# Step 1: Build & Test
build_job:
  stage: build
  script:
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - echo "Dependencies installed successfully!"
  artifacts:
    paths:
      - .venv/

# Step 2: Deployment
deploy_job:
  stage: deploy
  script:
    - echo "Deploying to Google Cloud..."
    - python3 src/deploy.py
  only:
    - main