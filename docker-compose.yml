version: "3.9"

services:
  app:
    build: .
    container_name: rapid-gitlab-mongo-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/rapid_agent
      - GITLAB_BASE_URL=https://gitlab.com/api/v4
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: rapid-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=rapid_agent
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  mongo_data: