<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retail AI Agent - Team Cloud Craft</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f5f5f0; min-height: 100vh; }
  .header { background: white; border-bottom: 1px solid #e5e5e5; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: #e6f1fb; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-text { font-size: 16px; font-weight: 500; }
  .logo-sub { font-size: 12px; color: #888; }
  .status-badge { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #16a34a; background: #f0fdf4; padding: 4px 12px; border-radius: 8px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .main { display: grid; grid-template-columns: 1fr 340px; gap: 16px; padding: 16px; max-width: 1100px; margin: 0 auto; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .metric-card { background: #f0f0eb; border-radius: 8px; padding: 14px 16px; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .metric-value { font-size: 24px; font-weight: 500; }
  .panel { background: white; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; }
  .panel-header { padding: 14px 16px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 8px; }
  .panel-title { font-size: 14px; font-weight: 500; }
  .products-list { padding: 8px; }
  .product-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; }
  .product-item:hover { background: #f5f5f0; }
  .product-name { font-size: 13px; font-weight: 500; }
  .product-cat { font-size: 11px; color: #888; }
  .stock-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #f0fdf4; color: #16a34a; }
  .orders-list { padding: 8px; }
  .order-item { padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; border: 1px solid #e5e5e5; }
  .order-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .order-status { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #fffbeb; color: #d97706; }
  .chat-panel { display: flex; flex-direction: column; height: 520px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 85%; padding: 10px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
  .msg-bot { background: #f5f5f0; align-self: flex-start; }
  .msg-user { background: #e6f1fb; color: #185fa5; align-self: flex-end; }
  .typing { display: flex; gap: 4px; padding: 12px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #888; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .chat-input-area { padding: 12px; border-top: 1px solid #e5e5e5; display: flex; gap: 8px; }
  .chat-input { flex: 1; padding: 8px 12px; font-size: 13px; border: 1px solid #e5e5e5; border-radius: 8px; outline: none; }
  .send-btn { width: 34px; height: 34px; border-radius: 8px; background: #e6f1fb; border: none; cursor: pointer; color: #185fa5; }
  .quick-btns { padding: 0 12px 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .quick-btn { font-size: 11px; padding: 4px 10px; border: 1px solid #e5e5e5; border-radius: 6px; background: transparent; color: #888; cursor: pointer; }
  .quick-btn:hover { background: #f5f5f0; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">🏪</div>
    <div>
      <div class="logo-text">Retail AI Agent</div>
      <div class="logo-sub">Team Cloud Craft · Google Cloud Run + MongoDB</div>
    </div>
  </div>
  <div class="status-badge"><div class="dot"></div>Live on Cloud Run</div>
</div>
<div class="main">
  <div>
    <div class="metrics">
      <div class="metric-card"><div class="metric-label">Total Products</div><div class="metric-value" id="prod-count">3</div></div>
      <div class="metric-card"><div class="metric-label">Recent Orders</div><div class="metric-value" id="order-count">1</div></div>
      <div class="metric-card"><div class="metric-label">Revenue</div><div class="metric-value">$259</div></div>
    </div>
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-header"><span class="panel-title">Product Inventory</span></div>
      <div class="products-list" id="products-list">Loading...</div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Recent Orders</span></div>
      <div class="orders-list" id="orders-list">Loading...</div>
    </div>
  </div>
  <div class="panel chat-panel">
    <div class="panel-header"><span class="panel-title">AI Agent Chat</span></div>
    <div class="chat-messages" id="chat">
      <div class="msg msg-bot">Hello! I am your Retail AI Agent. Ask me about products, orders, or analytics!</div>
    </div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="sendMsg('Show me all products')">All products</button>
      <button class="quick-btn" onclick="sendMsg('Show me all orders')">All orders</button>
      <button class="quick-btn" onclick="sendMsg('Store summary')">Summary</button>
    </div>
    <div class="chat-input-area">
      <input class="chat-input" id="msg-input" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
<script>
const API = 'https://google-rapid-agent-retail-44551099700.europe-west1.run.app';
const chat = document.getElementById('chat');

fetch(API+'/products').then(r=>r.json()).then(d=>{
  document.getElementById('prod-count').textContent = d.count || 0;
  const list = document.getElementById('products-list');
  list.innerHTML = d.products.map(p=>`<div class="product-item"><div><div class="product-name">${p.name}</div><div class="product-cat">${p.category||'General'}</div></div><div><div style="font-weight:500">$${p.price}</div><span class="stock-badge">${p.stock} units</span></div></div>`).join('');
});

fetch(API+'/orders').then(r=>r.json()).then(d=>{
  document.getElementById('order-count').textContent = d.orders.length || 0;
  const list = document.getElementById('orders-list');
  list.innerHTML = d.orders.map(o=>`<div class="order-item"><div class="order-top"><span style="font-size:13px;font-weight:500">${o.customer||'Customer'}</span><span class="order-status">${o.status||'processing'}</span></div><div style="font-size:12px;color:#888">${o.product||'Product'} x${o.quantity||1} · $${o.total||0}</div></div>`).join('') || '<div style="padding:12px;color:#888;font-size:13px">No orders yet</div>';
});

function addMsg(text, isUser) {
  const d = document.createElement('div');
  d.className = 'msg '+(isUser?'msg-user':'msg-bot');
  d.innerHTML = text.replace(/\n/g,'<br>');
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMsg(preset) {
  const input = document.getElementById('msg-input');
  const msg = preset || input.value.trim();
  if(!msg) return;
  input.value = '';
  addMsg(msg, true);
  const t = document.createElement('div');
  t.className='typing'; t.id='typing';
  t.innerHTML='<span></span><span></span><span></span>';
  chat.appendChild(t);
  try {
    const res = await fetch(API+'/query', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message:msg})});
    const data = await res.json();
    document.getElementById('typing')?.remove();
    addMsg(data.response||'Error', false);
  } catch(e) {
    document.getElementById('typing')?.remove();
    addMsg('Connection error.', false);
  }
}
</script>
</body>
</html>
